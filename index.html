<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Geo-AR Points of Interest with Distance</title>
    
    <!-- Core Framework Libraries -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>

    <style>
        /* Simple Info Popup Overlay styling */
        #info-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 15px;
            border-radius: 8px;
            font-family: sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
            z-index: 9999;
        }
        #close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .distance-badge {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 5px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Information UI Overlay -->
    <div id="info-popup">
        <button id="close-btn" onclick="closePopup()">×</button>
        <h3 id="popup-title" style="margin-top: 0;">POI Title</h3>
        <div id="popup-distance" class="distance-badge">Calculating distance...</div>
        <p id="popup-description">POI Description goes here.</p>
    </div>

    <!-- AR Scene Setup -->
    <a-scene 
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Asset Management System (Preloads models) -->
        <a-assets>
            <a-asset-item id="pin-model" src="https://githack.com"></a-asset-item>
        </a-assets>

       <a-gltf-model  src="/models/CU-Logo-7-9-2020.gltf" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear;" gps-entity-place="latitude: 42.72631557385698; longitude: -88.98145413539063" scale="10 10 10" healthandwellness></a-gltf-model>

<a-box animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear;" gps-entity-place="latitude: 42.72654312253844; longitude: -88.981312737158" material="color: red" scale="1 3 1"></box>
<a-box animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear;" gps-entity-place="latitude: 42.72633933133209; longitude: -88.98148485994354" material="color: purple" scale="11 5 1.5" healthandwellness></box>
  <a-box animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear;" gps-entity-place="latitude: 42.72634110107836; longitude: -88.98141296138944" material="color: green" scale="1.5 1.5 1.5" healthandwellness></box>


        
        

        <!-- Camera tracking with click-raycaster attached -->
        <a-camera 
            gps-camera 
            rotation-reader
            raycaster="objects: [gltf-model];" 
            cursor="fuse: false; rayOrigin: mouse;">
        </a-camera>

    </a-scene>

    <!-- Interactive Logic Script -->
    <script>
        // Custom component to handle click events and read dynamic distance metrics
        AFRAME.registerComponent('poi-click-listener', {
            schema: {
                title: {type: 'string', default: 'POI'},
                desc: {type: 'string', default: 'No data provided.'}
            },
            init: function () {
                const data = this.data;
                const el = this.el;

                this.el.addEventListener('click', function () {
                    // 1. Update text content
                    document.getElementById('popup-title').innerText = data.title;
                    document.getElementById('popup-description').innerText = data.desc;
                    
                    // 2. Fetch the distance calculated internally by AR.js
                    // This attribute is continuously updated by the gps-camera system
                    const distanceAttr = el.getAttribute('distanceMsg');
                    
                    if (distanceAttr) {
                        // If AR.js has already formatted a string (e.g. "150m")
                        document.getElementById('popup-distance').innerText = distanceAttr;
                    } else if (el.components['gps-entity-place'] && el.components['gps-entity-place'].distance) {
                        // Fallback: Read raw numerical distance in meters and format cleanly
                        const rawMeters = el.components['gps-entity-place'].distance;
                        document.getElementById('popup-distance').innerText = Math.round(rawMeters) + ' meters away';
                    } else {
                        document.getElementById('popup-distance').innerText = 'Location accurately pinpointed';
                    }

                    // 3. Reveal the UI layer
                    document.getElementById('info-popup').style.display = 'block';
                });
            }
        });

        // UI Close Function
        function closePopup() {
            document.getElementById('info-popup').style.display = 'none';
        }
    </script>
</body>
</html>
